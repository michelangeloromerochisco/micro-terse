<!DOCTYPE html>
<html lang="en" data-theme="dark" data-density="regular">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro-Terse</title>
<style>
:root{--accent:#FACC15;--accent-ink:#1c1600;--accent-soft:rgba(250,204,21,.14);--radius:14px;--radius-sm:10px;--radius-lg:20px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;--fs:15px;--maxw:760px;--sb:270px;--ease:cubic-bezier(.32,.72,0,1);}
html[data-theme="dark"]{--bg:#0b0d12;--surface-1:#12151c;--surface-2:#1a1e27;--surface-3:#222836;--surface-hover:rgba(255,255,255,.045);--border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.15);--text:#e9ebef;--text-2:#a6adba;--text-3:#6c7585;--code-bg:#0a0c11;--scrim:rgba(6,8,12,.55);}
html[data-theme="light"]{--bg:#f6f6f3;--surface-1:#ffffff;--surface-2:#f1f1ed;--surface-3:#e7e7e1;--surface-hover:rgba(0,0,0,.04);--border:rgba(20,22,28,.10);--border-strong:rgba(20,22,28,.18);--text:#1c1f26;--text-2:#5a606c;--text-3:#8b909c;--accent-ink:#8a6d00;--code-bg:#1a1d24;--scrim:rgba(30,32,40,.30);}
html[data-density="compact"]{--fs:14px;--maxw:780px;--sb:250px;}
html[data-density="comfy"]{--fs:16px;--maxw:720px;--sb:290px;}
*{box-sizing:border-box;}html,body{height:100%;margin:0;}
body{font-family:var(--font);font-size:var(--fs);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;}
#root{height:100vh;display:flex;flex-direction:column;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}::selection{background:var(--accent-soft);}
*{scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent;}
*::-webkit-scrollbar{width:9px;height:9px;}*::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:7px;border:2px solid transparent;background-clip:content-box;}*::-webkit-scrollbar-thumb:hover{background:var(--text-3);}
@keyframes fadeUp{from{transform:translateY(8px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes dotPulse{0%,80%,100%{opacity:.25;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}
@keyframes spin{to{transform:rotate(360deg);}}
.fade-up{animation:fadeUp .32s var(--ease) both;}

.app{display:flex;flex-direction:column;height:100vh;background:var(--bg);position:relative;}
.titlebar{height:44px;flex:none;display:flex;align-items:center;gap:8px;padding:0 12px 0 14px;border-bottom:1px solid var(--border);background:var(--surface-1);user-select:none;position:relative;z-index:30;}
.logo-mark{width:28px;height:28px;border-radius:8px;background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
.tb-title{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.status{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:8px;font-size:12px;color:var(--text-3);background:var(--surface-2);border:1px solid var(--border);}
.status .dot{width:7px;height:7px;border-radius:50%;background:var(--text-3);} .status.online .dot{background:#22c55e;} .status.offline .dot{background:#ef4444;}
.iconbtn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;color:var(--text-2);transition:background .15s,color .15s;}
.iconbtn:hover{background:var(--surface-hover);color:var(--text);}
.iconbtn.sm{width:30px;height:30px;border-radius:8px;}

.body{flex:1;display:flex;min-height:0;position:relative;}
.sidebar{width:var(--sb);flex:none;background:var(--surface-1);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;transition:width .3s var(--ease),transform .3s var(--ease);}
.sb-head{padding:12px 12px 8px;display:flex;flex-direction:column;gap:8px;}
.newchat{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:11px;background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:14px;transition:filter .15s;}
.newchat:hover{filter:brightness(1.08);}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 8px 8px;}
.sb-group{margin-top:12px;}.sb-group:first-child{margin-top:2px;}
.sb-group-h{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3);padding:6px 10px 4px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;color:var(--text-2);cursor:pointer;position:relative;transition:background .13s,color .13s;}
.sb-item:hover{background:var(--surface-hover);color:var(--text);}
.sb-item.active{background:var(--surface-2);color:var(--text);}
.sb-item.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:3px;background:var(--accent);}
.sb-item .t{flex:1;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-pin{color:var(--accent-ink);opacity:.85;}
.sb-item .more{opacity:0;color:var(--text-3);transition:opacity .13s;}
.sb-item:hover .more{opacity:1;}
.sb-foot{border-top:1px solid var(--border);padding:8px 10px;display:flex;align-items:center;gap:8px;}
.scrim{position:absolute;inset:0;background:var(--scrim);z-index:20;opacity:0;pointer-events:none;transition:opacity .3s var(--ease);backdrop-filter:blur(1px);}
@media (max-width:900px){.sidebar{position:absolute;left:0;top:0;bottom:0;z-index:25;box-shadow:var(--shadow);}.sidebar.closed{transform:translateX(-100%);box-shadow:none;}.scrim.show{opacity:1;pointer-events:auto;}}
@media (min-width:901px){.scrim{display:none;}} .sidebar.closed{width:0;border-right-color:transparent;overflow:hidden;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text-3);text-align:center;padding:24px;}
.empty .big{font-size:44px;font-weight:700;color:var(--accent);letter-spacing:-.04em;}
.empty p{margin:0;max-width:440px;line-height:1.55;}
.starters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;margin-top:4px;}
.chip{padding:8px 14px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:13.5px;font-family:inherit;transition:background .14s,color .14s,border-color .14s,transform .14s;}
.chip:hover{background:var(--accent-soft);color:var(--text);border-color:var(--accent);transform:translateY(-1px);}
.chip:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.messages{flex:1;overflow-y:auto;scroll-behavior:smooth;}
.thread{max-width:var(--maxw);margin:0 auto;padding:28px 28px 16px;display:flex;flex-direction:column;gap:24px;}

.msg-row{display:flex;gap:12px;align-items:flex-start;}
.msg-row.user{justify-content:flex-end;}
.ava{width:30px;height:30px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--surface-2);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--accent-ink);}
.msg-col{min-width:0;max-width:100%;}
.msg-name{font-size:12px;font-weight:600;color:var(--text-2);margin:6px 0 5px;}
.bubble{background:var(--surface-2);border:1px solid var(--border);padding:11px 16px;border-radius:18px 6px 18px 18px;max-width:560px;font-size:var(--fs);line-height:1.6;color:var(--text);white-space:pre-wrap;}
.msg-row.user .bubble{border-radius:6px 18px 18px 18px;background:var(--accent);color:var(--accent-ink);border-color:transparent;}
.assistant-content{font-size:var(--fs);line-height:1.72;color:var(--text);padding-top:2px;}
.assistant-content h1,.assistant-content h2,.assistant-content h3,.assistant-content p{margin:0 0 .7em;}
.assistant-content h1{font-size:1.35em;}.assistant-content h2{font-size:1.15em;}.assistant-content h3{font-size:1em;}
.assistant-content ul,.assistant-content ol{margin:0 0 .7em 1.2em;padding:0;}
.assistant-content code{font-family:var(--mono);background:var(--surface-2);padding:2px 5px;border-radius:5px;font-size:.92em;}
.assistant-content pre{position:relative;background:var(--code-bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;overflow-x:auto;margin:0 0 .8em;}
.assistant-content pre code{background:none;padding:0;border-radius:0;font-size:.9em;}
.copy-code{position:absolute;top:8px;right:8px;padding:4px 8px;border-radius:6px;background:var(--surface-2);border:1px solid var(--border);font-size:11px;color:var(--text-2);opacity:0;transition:opacity .15s;}
.assistant-content pre:hover .copy-code{opacity:1;}
.thinking{background:var(--surface-1);border:1px dashed var(--border-strong);border-radius:10px;padding:10px 14px;margin:0 0 12px;font-style:italic;color:var(--text-3);font-size:.95em;}
.thinking-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;color:var(--accent-ink);}
.msg-actions{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity .15s;}
.msg-row:hover .msg-actions{opacity:1;}
.act{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:7px;color:var(--text-3);font-size:12px;transition:background .13s,color .13s;}
.act:hover{background:var(--surface-hover);color:var(--text);}
.thinking-dots{display:flex;gap:5px;padding:8px 2px;align-items:center;}
.thinking-dots i{width:7px;height:7px;border-radius:50%;background:var(--text-3);display:block;animation:dotPulse 1.2s infinite;}
.thinking-dots i:nth-child(2){animation-delay:.18s;}.thinking-dots i:nth-child(3){animation-delay:.36s;}
.caret{display:inline-block;width:8px;height:1.05em;background:var(--accent);vertical-align:-2px;margin-left:3px;border-radius:1px;animation:blink 1s steps(1) infinite;}

.composer-wrap{flex:none;padding:10px 28px 22px;}
.composer{max-width:var(--maxw);margin:0 auto;background:var(--surface-1);border:1px solid var(--border-strong);border-radius:var(--radius-lg);box-shadow:0 4px 16px -6px rgba(0,0,0,.25);transition:border-color .18s,box-shadow .18s;overflow:hidden;}
.composer:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft),0 4px 16px -6px rgba(0,0,0,.25);}
.composer textarea{width:100%;border:none;outline:none;resize:none;background:none;color:var(--text);font-family:inherit;font-size:var(--fs);line-height:1.5;padding:14px 16px;min-height:54px;max-height:180px;display:block;}
.composer textarea::placeholder{color:var(--text-3);}
.composer-bar{display:flex;align-items:center;gap:6px;padding:0 10px 10px;}
.composer-bar .left{display:flex;align-items:center;gap:6px;flex:1;}
.composer-bar .file{display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:7px;background:var(--accent-soft);color:var(--accent-ink);font-size:12px;}
.composer-bar .file .x{cursor:pointer;color:var(--text-2);}
.composer-bar .hint{color:var(--text-3);font-size:12px;}
.send{width:34px;height:34px;border-radius:50%;background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;transition:filter .15s;flex:none;}
.send:hover{filter:brightness(1.08);}.send:disabled{opacity:.5;cursor:not-allowed;}
.composer textarea:disabled{opacity:.6;cursor:not-allowed;}

.settings{position:absolute;right:14px;top:54px;width:280px;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:40;padding:14px;display:none;flex-direction:column;gap:12px;}
.settings.show{display:flex;animation:fadeUp .18s var(--ease);}
.settings h3{margin:0 0 4px;font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;}
.row{display:flex;align-items:center;gap:8px;}
.row label{font-size:13px;color:var(--text-2);flex:1;}
.row select,.row input[type="range"]{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:5px 8px;outline:none;}
.row select{min-width:110px;}
.row input[type="range"]{flex:1;padding:0;}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.swatch.active{border-color:var(--text);}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface-1);color:var(--text);border:1px solid var(--border-strong);padding:10px 16px;border-radius:10px;box-shadow:var(--shadow);font-size:13px;z-index:50;opacity:0;pointer-events:none;transition:opacity .2s;}
.toast.show{opacity:1;}
.error-toast{background:#450a0a;color:#fecaca;border-color:#ef4444;}
@media (max-width:600px){.thread{padding:18px 16px 12px;gap:18px;}.composer-wrap{padding:8px 14px 14px;}}
</style>
</head>
<body>
<div id="root">
  <div class="app">
    <div class="titlebar">
      <button class="iconbtn sm" id="menuBtn" title="Toggle sidebar">☰</button>
      <div class="logo-mark">T</div>
      <div class="tb-title">Micro-Terse</div>
      <div class="status" id="status" title="Backend status"><span class="dot"></span><span id="statusText">checking…</span></div>
      <button class="iconbtn sm" id="settingsBtn" title="Settings">⚙</button>
    </div>
    <div class="body">
      <aside class="sidebar closed" id="sidebar">
        <div class="sb-head">
          <button class="newchat" id="newChatBtn">＋ New chat</button>
        </div>
        <div class="sb-scroll" id="sidebarContent"></div>
        <div class="sb-foot">
          <button class="iconbtn sm" id="exportBtn" title="Export conversations">⇧</button>
          <button class="iconbtn sm" id="importBtn" title="Import conversations">⇩</button>
          <input type="file" id="importFile" accept=".json,.jsonl" style="display:none">
        </div>
      </aside>
      <div class="scrim" id="scrim"></div>
      <main class="main" id="main">
        <div class="empty" id="empty"><div class="big">TERSE</div><p>A 423M ternary-weight language model, trained from scratch.<br>A small research model — try an open-ended prompt:</p><div class="starters" id="starters"></div></div>
        <div class="messages" id="messages" style="display:none"><div class="thread" id="thread"></div></div>
        <div class="composer-wrap">
          <div class="composer">
            <textarea id="input" rows="1" placeholder="Ask Micro-Terse…"></textarea>
            <div class="composer-bar">
              <div class="left">
                <button class="iconbtn sm" id="attachBtn" title="Attach file">📎</button>
                <input type="file" id="fileInput" style="display:none" accept=".txt,.md,.py,.js,.html,.css,.ts,.json,.csv,.xml,.yaml,.sql,.sh,.bat,.ps1,.rs,.go,.java,.cpp,.c,.h,.log">
                <div class="file" id="fileTag" style="display:none"><span id="fileName"></span><span class="x" id="removeFile">✕</span></div>
                <span class="hint">Enter to send · Shift+Enter for new line</span>
              </div>
              <button class="send" id="sendBtn" title="Send">▶</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>
<div class="settings" id="settings">
  <h3>Appearance</h3>
  <div class="row"><label>Theme</label><select id="themeSelect"><option value="dark">Dark</option><option value="light">Light</option><option value="system">System</option></select></div>
  <div class="row"><label>Density</label><select id="densitySelect"><option value="regular">Regular</option><option value="compact">Compact</option><option value="comfy">Comfy</option></select></div>
  <h3>Accent</h3>
  <div class="row" id="accents"></div>
  <h3>Generation</h3>
  <div class="row"><label>Max tokens</label><input type="range" id="maxTokens" min="64" max="1024" step="64" value="512"></div>
  <div class="row"><label>Temperature</label><input type="range" id="temperature" min="0" max="20" step="1" value="7"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const STORAGE='terse-web-v1';
const API='/v1/chat/completions';
const STATUS='/v1/status';
const MODELS='/v1/models';
const DEMO_TITLE='Micro-Terse';
const STARTERS=['Tell me about a small town in France.','Describe a sunny morning by the sea.','Write a few sentences about the ocean.','Tell me a short story about a traveler.','Why is reading good for you?'];
const ACCENTS={gold:'#FACC15',rose:'#fb7185',sky:'#38bdf8',mint:'#34d399',violet:'#a78bfa',orange:'#fb923c'};
const FILE_TYPES='.txt,.md,.py,.js,.html,.css,.ts,.json,.csv,.xml,.yaml,.sql,.sh,.bat,.ps1,.rs,.go,.java,.cpp,.c,.h,.log'.split(',');

const ID_RE=/^[a-zA-Z0-9_-]+$/;
let state={conversations:{},current:null,pinned:new Set(),theme:'dark',density:'regular',accent:'gold',maxTokens:512,temperature:0.7,attachedFile:null};
let abortController=null;

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE);
    if(raw){
      const s=JSON.parse(raw);
      if(s && typeof s==='object'){
        const clean={};
        for(const [k,v] of Object.entries(s.conversations||{})){if(isValidId(k) && v && Array.isArray(v.messages)) clean[k]=v;}
        state.conversations=clean;
        if(isValidId(s.current)) state.current=s.current;
        if(Array.isArray(s.pinned)) state.pinned=new Set(s.pinned.filter(isValidId));
        if(['dark','light','system'].includes(s.theme)) state.theme=s.theme;
        if(['regular','compact','comfy'].includes(s.density)) state.density=s.density;
        if(Object.keys(ACCENTS).includes(s.accent)) state.accent=s.accent;
        if(typeof s.maxTokens==='number') state.maxTokens=s.maxTokens;
        if(typeof s.temperature==='number') state.temperature=s.temperature;
      }
    }
  }catch(e){}
  applyTheme(); applyAccent(); applyDensity();
  document.getElementById('themeSelect').value=state.theme;
  document.getElementById('densitySelect').value=state.density;
  document.getElementById('maxTokens').value=state.maxTokens;
  document.getElementById('temperature').value=Math.round(state.temperature*10);
  renderAccents();
}
function saveState(){localStorage.setItem(STORAGE,JSON.stringify(state));}
function applyTheme(){
  let t=state.theme; if(t==='system') t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
}
function applyDensity(){document.documentElement.setAttribute('data-density',state.density);}
function applyAccent(){
  const c=ACCENTS[state.accent]||ACCENTS.gold; const root=document.documentElement.style;
  root.setProperty('--accent',c); root.setProperty('--accent-soft',hexToRgba(c,0.14));
  root.setProperty('--accent-ink',isLight(c)?'#1c1600':'#fff8dc');
}
function isLight(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return (r*299+g*587+b*114)/1000>150;}
function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`;}
function isValidId(id){return typeof id==='string' && ID_RE.test(id);}
function genId(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function now(){return new Date().toISOString();}
function fmtDate(d){const t=new Date(d),today=new Date(),yest=new Date(today); yest.setDate(yest.getDate()-1); const ds=t.toDateString(); if(ds===today.toDateString()) return 'Today'; if(ds===yest.toDateString()) return 'Yesterday'; return t.toLocaleDateString(undefined,{month:'short',day:'numeric'});}
function titleFromText(text){const t=text.replace(/\s+/g,' ').trim(); if(!t) return 'New chat'; return t.slice(0,40)+(t.length>40?'…':'');}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function showToast(msg,error=false){const el=document.getElementById('toast'); el.textContent=msg; el.className='toast'+(error?' error-toast':'')+' show'; setTimeout(()=>el.classList.remove('show'),3000);}

function newConversation(){return {id:genId(),title:'New chat',created:now(),updated:now(),messages:[],model:'terse-micro'};}
function setCurrent(id){if(id && !isValidId(id)) return; state.current=id; if(id && !state.conversations[id]){state.conversations[id]=newConversation();} saveState(); renderSidebar(); renderMain();}
function deleteConversation(id){if(!isValidId(id)) return; delete state.conversations[id]; if(state.pinned.has(id)) state.pinned.delete(id); if(state.current===id){state.current=null;} saveState(); renderSidebar(); renderMain();}
function togglePin(id){if(!isValidId(id)) return; if(state.pinned.has(id)) state.pinned.delete(id); else state.pinned.add(id); saveState(); renderSidebar();}

function renderAccents(){
  const el=document.getElementById('accents'); el.innerHTML=Object.entries(ACCENTS).map(([name,hex])=>`<span class="swatch ${state.accent===name?'active':''}" style="background:${hex}" data-name="${name}" title="${name}"></span>`).join('');
  el.querySelectorAll('.swatch').forEach(s=>s.onclick=()=>{state.accent=s.dataset.name; saveState(); renderAccents(); applyAccent();});
}
function renderSidebar(){
  const container=document.getElementById('sidebarContent');
  const groups={pinned:[],today:[],yesterday:[],week:[],older:[]};
  const ids=Object.keys(state.conversations).filter(isValidId).sort((a,b)=>new Date(state.conversations[b].updated)-new Date(state.conversations[a].updated));
  ids.forEach(id=>{const c=state.conversations[id]; if(!c || typeof c.updated!=='string') return; if(state.pinned.has(id)) return groups.pinned.push(id); const d=fmtDate(c.updated); if(d==='Today') groups.today.push(id); else if(d==='Yesterday') groups.yesterday.push(id); else if(new Date()-new Date(c.updated)<7*86400000) groups.week.push(id); else groups.older.push(id);});
  const sections=[{k:'pinned',l:'Pinned'},{k:'today',l:'Today'},{k:'yesterday',l:'Yesterday'},{k:'week',l:'Previous 7 days'},{k:'older',l:'Older'}];
  container.innerHTML=sections.map(({k,l})=>groups[k].length?`<div class="sb-group"><div class="sb-group-h">${l}</div>${groups[k].map(id=>itemHtml(id)).join('')}</div>`:'').join('');
  container.querySelectorAll('.sb-item').forEach(it=>{
    it.onclick=()=>{setCurrent(it.dataset.id); closeSidebar();};
    it.querySelector('.more')?.addEventListener('click',e=>{e.stopPropagation(); const id=it.dataset.id; const m=state.conversations[id]; const act=prompt(`Actions for "${m.title}":\ndelete | pin | rename`,'pin'); if(act==='delete') deleteConversation(id); else if(act==='pin') togglePin(id); else if(act==='rename'){const t=prompt('New title',m.title); if(t){m.title=t; saveState(); renderSidebar();}}});
  });
}
function itemHtml(id){if(!isValidId(id)) return ''; const c=state.conversations[id]; const pin=state.pinned.has(id)?'<span class="sb-pin">★</span>':''; return `<div class="sb-item ${state.current===id?'active':''}" data-id="${escapeHtml(id)}"><span class="t">${escapeHtml(c.title)}</span>${pin}<span class="more">⋯</span></div>`;}

function renderMain(){
  const empty=document.getElementById('empty'); const msgs=document.getElementById('messages'); const thread=document.getElementById('thread');
  if(!state.current){empty.style.display='flex'; msgs.style.display='none'; thread.innerHTML=''; return;}
  empty.style.display='none'; msgs.style.display='block';
  const c=state.conversations[state.current];
  thread.innerHTML=c.messages.map((m,i)=>renderMessage(m,i,c.messages)).join('');
  thread.querySelectorAll('pre code').forEach(block=>{const pre=block.parentElement; const btn=document.createElement('button'); btn.className='copy-code'; btn.textContent='Copy'; btn.onclick=()=>{navigator.clipboard.writeText(block.textContent); showToast('Copied');}; pre.appendChild(btn);});
  scrollToBottom();
}
function renderMessage(msg,idx,messages){
  if(msg.role==='user'){
    return `<div class="msg-row user fade-up"><div class="msg-col"><div class="bubble">${escapeHtml(msg.content)}</div></div></div>`;
  }
  const {thinking,main}=parseThinking(msg.content);
  let html='';
  if(thinking) html+=`<div class="thinking"><span class="thinking-label">thinking</span>${escapeHtml(thinking)}</div>`;
  html+=`<div class="assistant-content markdown">${markdownToHtml(main)}</div>`;
  const lastAssistant=messages.slice(idx+1).every(m=>m.role!=='assistant');
  const actions=`<div class="msg-actions"><button class="act" data-act="copy" data-idx="${idx}">Copy</button>${lastAssistant?'<button class="act" data-act="regen" data-idx="'+idx+'">Regenerate</button>':''}</div>`;
  return `<div class="msg-row fade-up"><div class="ava">T</div><div class="msg-col"><div class="msg-name">Micro-Terse</div>${html}${actions}</div></div>`;
}
function parseThinking(text){
  const parts=[];
  const main=text.replace(/<thinking>([\s\S]*?)<\/thinking>/g,(_,p1)=>{parts.push(p1); return '';});
  return {thinking:parts.join('\n\n').trim(),main:main.trim()};
}
function markdownToHtml(md){
  const codeBlocks=[];
  const mdWithoutCode=md.replace(/```([\w]*)\n([\s\S]*?)```/g,(_,lang,body)=>{
    const id='__CODE_'+codeBlocks.length+'__';
    codeBlocks.push({lang,body:escapeHtml(body)});
    return id;
  });
  let html=escapeHtml(mdWithoutCode);
  html=html.replace(/^###### (.*$)/gim,'<h6>$1</h6>').replace(/^##### (.*$)/gim,'<h5>$1</h5>').replace(/^#### (.*$)/gim,'<h4>$1</h4>').replace(/^### (.*$)/gim,'<h3>$1</h3>').replace(/^## (.*$)/gim,'<h2>$1</h2>').replace(/^# (.*$)/gim,'<h1>$1</h1>');
  html=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
  html=html.replace(/^\> (.*$)/gim,'<blockquote>$1</blockquote>');
  html=html.replace(/^\- (.*$)/gim,'<li>$1</li>'); html=html.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>'); html=html.replace(/<\/ul>\s*<ul>/g,'');
  html=html.replace(/\n/g,'<br>');
  codeBlocks.forEach(({lang,body},i)=>{
    html=html.replace('__CODE_'+i+'__',`<pre><code class="language-${lang}">${body}</code></pre>`);
  });
  return html;
}
function scrollToBottom(){setTimeout(()=>{const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight;},10);}
function renderStarters(){
  const el=document.getElementById('starters'); if(!el) return;
  el.innerHTML=STARTERS.map(s=>`<button class="chip" type="button">${escapeHtml(s)}</button>`).join('');
  el.querySelectorAll('.chip').forEach((b,i)=>{b.onclick=()=>{document.getElementById('input').value=STARTERS[i]; sendMessage();};});
}

async function sendMessage(){
  const input=document.getElementById('input'); const text=input.value.trim(); if(!text && !state.attachedFile) return;
  let content=text; if(state.attachedFile){content+=`\n\n\`\`\`${extToLang(state.attachedFile.name)}\n${state.attachedFile.content}\n\`\`\``;}
  input.value=''; input.style.height='auto'; clearAttachment();
  if(!state.current) setCurrent(genId());
  const c=state.conversations[state.current]; c.messages.push({role:'user',content:content}); c.title=titleFromText(text||'Attached file'); c.updated=now(); saveState(); renderSidebar(); renderMain();
  await streamAssistant();
}
async function streamAssistant(){
  const c=state.conversations[state.current];
  c.messages.push({role:'assistant',content:''}); const aiIdx=c.messages.length-1;
  renderMain();
  const thread=document.getElementById('thread');
  const row=document.createElement('div'); row.className='msg-row fade-up'; row.innerHTML=`<div class="ava">T</div><div class="msg-col"><div class="msg-name">Micro-Terse</div><div class="assistant-content" id="live"></div><div class="thinking-dots" id="dots"><i></i><i></i><i></i></div></div></div>`;
  thread.appendChild(row); scrollToBottom();
  const live=row.querySelector('#live'); const dots=row.querySelector('#dots');
  abortController=new AbortController();
  let full='';
  let dotsRemoved=false;
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'terse-micro',messages:c.messages.slice(0,-1).map(m=>({role:m.role,content:m.content})),stream:true,temperature:state.temperature,max_tokens:state.maxTokens,top_p:0.9}),signal:abortController.signal});
    if(!r.ok){
      let detail='';
      try{detail=await r.text();}catch{};
      throw new Error(`HTTP ${r.status}${detail?': '+detail.slice(0,200):''}`);
    }
    const reader=r.body.getReader(); const dec=new TextDecoder();
    let buffer='';
    while(true){
      const {done,value}=await reader.read(); if(done) break; buffer+=dec.decode(value,{stream:true});
      const lines=buffer.split('\n'); buffer=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        const data=line.slice(6).trim();
        if(data==='[DONE]') continue;
        try{
          const j=JSON.parse(data);
          const d=j.choices?.[0]?.delta?.content||'';
          if(d){
            full+=d;
            if(!dotsRemoved){ dots.remove(); dotsRemoved=true; }
            live.innerHTML=markdownToHtml(parseThinking(full).main)+`<span class="caret"></span>`;
            scrollToBottom();
          }
        }catch(e){ console.warn('Malformed SSE chunk:', data.slice(0,80)); }
      }
    }
  }catch(err){
    if(err.name!=='AbortError'){
      console.error('Chat error:', err);
      full+=`\n\n[Error: ${err.message}]`;
      if(!dotsRemoved){ dots.remove(); dotsRemoved=true; }
      live.innerHTML=markdownToHtml(full);
      showToast(err.message, true);
    }
  }
  c.messages[aiIdx].content=full; c.updated=now(); saveState(); renderMain();
  abortController=null;
}
function stopStream(){if(abortController){abortController.abort(); abortController=null;}}
function regenerate(idx){if(!state.current) return; const c=state.conversations[state.current]; c.messages=c.messages.slice(0,idx); saveState(); renderMain(); streamAssistant();}

function extToLang(name){const ext=name.split('.').pop().toLowerCase(); const map={py:'python',js:'javascript',ts:'typescript',sh:'bash',ps1:'powershell',rs:'rust',go:'go',java:'java',cpp:'cpp',c:'c',h:'cpp',html:'html',css:'css',json:'json',yaml:'yaml',yml:'yaml',sql:'sql',md:'markdown',txt:'text'}; return map[ext]||'text';}

async function checkStatus(){
  const el=document.getElementById('status'); const txt=document.getElementById('statusText'); const sendBtn=document.getElementById('sendBtn'); const input=document.getElementById('input');
  try{
    const r=await fetch(STATUS,{cache:'no-store'});
    if(!r.ok) throw new Error();
    const d=await r.json();
    el.classList.add('online'); el.classList.remove('offline');
    txt.textContent=d.demo_mode?'demo':'real · '+d.device;
    sendBtn.disabled=false; input.placeholder='Ask Micro-Terse…';
    document.querySelectorAll('.chip').forEach(c=>c.disabled=false);
  }catch{
    el.classList.remove('online'); el.classList.add('offline'); txt.textContent='offline';
    sendBtn.disabled=true; input.placeholder='Backend offline — start the server';
    document.querySelectorAll('.chip').forEach(c=>c.disabled=true);
  }
}

function handleFile(file){
  if(!file || !FILE_TYPES.some(e=>file.name.toLowerCase().endsWith(e))){showToast('Unsupported file type'); return;}
  if(file.size>50*1024){showToast('File too large (max 50KB)'); return;}
  const reader=new FileReader(); reader.onload=e=>{state.attachedFile={name:file.name,content:e.target.result}; document.getElementById('fileName').textContent=file.name; document.getElementById('fileTag').style.display='flex';}; reader.readAsText(file);
}
function clearAttachment(){state.attachedFile=null; document.getElementById('fileTag').style.display='none'; document.getElementById('fileName').textContent='';}

function exportConversations(){
  const data={version:1,exported:now(),conversations:state.conversations,pinned:Array.from(state.pinned)};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`terse-chats-${new Date().toISOString().slice(0,10)}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast('Exported');
}
function importConversations(text){
  try{
    const data=JSON.parse(text);
    if(!data || typeof data!=='object') throw new Error('bad format');
    const imported={};
    for(const [k,v] of Object.entries(data.conversations||{})){
      if(isValidId(k) && v && Array.isArray(v.messages) && v.messages.every(m=>m && typeof m.role==='string' && typeof m.content==='string')){
        imported[k]={id:k,title:String(v.title||'Imported chat'),created:v.created||now(),updated:v.updated||now(),messages:v.messages,model:v.model||'terse-micro'};
      }
    }
    Object.assign(state.conversations,imported);
    if(Array.isArray(data.pinned)) data.pinned.filter(isValidId).forEach(id=>state.pinned.add(id));
    saveState(); renderSidebar(); showToast(`Imported ${Object.keys(imported).length} conversation(s)`);
  }catch(e){showToast('Invalid import file', true);}
}

function openSidebar(){document.getElementById('sidebar').classList.remove('closed'); document.getElementById('scrim').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.add('closed'); document.getElementById('scrim').classList.remove('show');}
function toggleSettings(){document.getElementById('settings').classList.toggle('show');}

function wireEvents(){
  const input=document.getElementById('input');
  input.addEventListener('keydown',e=>{if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); sendMessage();}});
  input.addEventListener('input',()=>{input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,180)+'px';});
  document.getElementById('sendBtn').onclick=sendMessage;
  document.getElementById('newChatBtn').onclick=()=>{setCurrent(genId()); closeSidebar(); input.focus();};
  document.getElementById('menuBtn').onclick=()=>{const sb=document.getElementById('sidebar'); if(sb.classList.contains('closed')) openSidebar(); else closeSidebar();};
  document.getElementById('scrim').onclick=closeSidebar;
  document.getElementById('settingsBtn').onclick=(e)=>{e.stopPropagation(); toggleSettings();};
  document.addEventListener('click',e=>{if(!e.target.closest('#settings') && !e.target.closest('#settingsBtn')) document.getElementById('settings').classList.remove('show');});
  document.getElementById('themeSelect').onchange=e=>{state.theme=e.target.value; saveState(); applyTheme();};
  document.getElementById('densitySelect').onchange=e=>{state.density=e.target.value; saveState(); applyDensity();};
  document.getElementById('maxTokens').oninput=e=>{state.maxTokens=parseInt(e.target.value); saveState();};
  document.getElementById('temperature').oninput=e=>{state.temperature=parseInt(e.target.value)/10; saveState();};
  document.getElementById('attachBtn').onclick=()=>document.getElementById('fileInput').click();
  document.getElementById('fileInput').onchange=e=>{if(e.target.files[0]) handleFile(e.target.files[0]); e.target.value='';};
  document.getElementById('removeFile').onclick=clearAttachment;
  document.getElementById('exportBtn').onclick=exportConversations;
  document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=e=>{const f=e.target.files[0]; if(f){const r=new FileReader(); r.onload=ev=>importConversations(ev.target.result); r.readAsText(f);} e.target.value='';};
  document.addEventListener('click',e=>{
    const a=e.target.closest('[data-act]'); if(!a) return;
    const idx=parseInt(a.dataset.idx), c=state.conversations[state.current];
    if(a.dataset.act==='copy'){navigator.clipboard.writeText(c.messages[idx].content); showToast('Copied');}
    else if(a.dataset.act==='regen'){regenerate(idx);}
  });
  document.addEventListener('keydown',e=>{
    if(e.ctrlKey || e.metaKey){
      if(e.key.toLowerCase()==='n'){e.preventDefault(); setCurrent(genId()); input.focus();}
    }
    if(e.key==='Escape'){closeSidebar(); document.getElementById('settings').classList.remove('show');}
  });
}

loadState();
wireEvents();
renderStarters();
setInterval(checkStatus,5000);
checkStatus();
</script>
