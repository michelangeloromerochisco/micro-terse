model:
  hidden_dim: 1536
  num_layers: 16
  num_heads: 12
  num_kv_heads: 3
  head_dim: 128
  ffn_intermediate: 4096
  num_experts: 4
  top_k: 2
  moe_bias_ema_gamma: 0.001
  vocab_size: 128256
  tie_embeddings: true
  max_seq_len: 4096
  rope_theta: 500000.0
  rms_norm_eps: 1.0e-6
  qk_norm: true
  ternary_weights: true
  fogzo: true
  mtp_heads: 1
  mtp_loss_weight: 0.1
  gradient_checkpointing: true

training:
  tokens_total: 8000000000
  batch_size: 4
  seq_len: 4096
  total_steps: 488282
  lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  grad_clip: 1.0
  warmup_steps: 2000
  precision: bfloat16
  cooldown_enabled: false       # A6000 gets no FP8/FP16 cooldown benefit; flip true for Mini
  cooldown_start_frac: 0.8
  cooldown_dtype: float16
  ce_chunk_size: 0
  save_every_steps: 2000
  eval_every_steps: 5000
  log_every_steps: 10
  save_dir: checkpoints
